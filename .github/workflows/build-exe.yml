name: 打包 Windows exe

on:
  push:
    branches: [ main, master ]
    paths:
      - '花吉食菜单转换器.py'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl python-pptx

      - name: 🔨 打包 exe
        shell: cmd
        run: |
          pyinstaller ^
            --name "花吉食菜单转换器" ^
            --onefile ^
            --windowed ^
            --clean ^
            --noconfirm ^
            --add-data "花吉食菜单转换器.py;." ^
            --hidden-import openpyxl ^
            --hidden-import pptx ^
            --hidden-import tkinter ^
            花吉食菜单转换器.py

      - name: 📤 上传 exe 构件
        uses: actions/upload-artifact@v4
        with:
          name: 花吉食菜单转换器-Windows
          path: dist/花吉食菜单转换器.exe
          if-no-files-found: error
